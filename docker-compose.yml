# ============================================
  # MONITORING STACK
  # ============================================
  prometheus:
    image: prom/prometheus:v3.5.4
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.listen-address=0.0.0.0:9090'  # ← Optionnel mais recommandé
    ports:
      - "9090:9090"  # ← Utilisez "ports" au lieu de "expose"
    networks:
      - app-network  # On utilise votre réseau existant

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3002:3000"    # On utilise le port 3002 pour éviter le conflit avec votre frontend (3000)
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin  # Mot de passe par défaut (à changer)
    networks:
      - app-network
    depends_on:
      - prometheus

networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.10.0.0/16

volumes:
  # Bases de données
  # postgres_data:
  #   driver: local
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local  
  # redis_data:
  #   driver: local
  
  # Logs
  nginx_logs:
    driver: local
  
