# version: '3.8'

services:
  # Frontend NextJS
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: app-frontend-service10
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # - NODE_ENV=production
      - NODE_ENV=development    # Changé
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - PORT=3000
    networks:
      - app-network
    volumes:
      # - ./frontend/src:/app/src          # Monte uniquement src
      # - ./frontend/public:/app/public    # Monte public
      # - ./frontend/app:/app/app          # Monte app
      # - ./frontend/package.json:/app/package.json
      # - ./frontend/package-lock.json:/app/package-lock.json
      - /app/node_modules                # ← IMPORTANT : Préserve node_modules
      # - /app/.next                       # ← IMPORTANT : Préserve .next   
      - ./frontend:/app          # Gardez ce volume pour le développement
    # command: npm run dev            # ← AJOUTEZ CETTE LIGNE ! Préserve .next
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G    
      

  # Backend NestJS
  # Backend NestJS
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: app-backend-service10
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3001
      # - MONGODB_URI=mongodb://mongodb:27017/app
      - MONGODB_URI=mongodb://albin:Albin%401234@mongodb:27017/appdb 
      - MONGODB_DB=appdb
      - JWT_SECRET=${JWT_SECRET:-supersecretkey}
      - CORS_ORIGIN=http://localhost
      - TZ=UTC
      - DEBUG=*
      - LOG_LEVEL=debug
    networks:
      - app-network
    volumes:
      # Pour le développement avec hot-reload
      # - ./backend/src:/app/src
      # - ./backend/package.json:/app/package.json
      # - ./backend/package-lock.json:/app/package-lock.json
      # - ./backend/tsconfig.json:/app/tsconfig.json
      # - ./backend/nest-cli.json:/app/nest-cli.json
      # - /app/node_modules        # Garde node_modules du conteneur
      # - /app/dist                # ← CRUCIAL : Garde dist du conteneur
      - ./backend:/app          # Gardez ce volume pour le développement
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Nginx Reverse Proxy
  nginx:
    # image: ubuntu/nginx:1.18-22.04_beta
    # container_name: app-nginx-ubuntu
    image: nginx:stable-alpine3.23-slim 
    container_name: nginx-alpine10
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - app-network
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M    

