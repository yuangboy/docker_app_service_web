version: '3.8'

services:
  # Frontend NextJS
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: app-frontend-service10
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # - NODE_ENV=production
      - NODE_ENV=development    # Changé
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - PORT=3000
    networks:
      - app-network
    volumes:
      - ./frontend:/app          # Gardez ce volume pour le développement
      - /app/node_modules        # 👈 Ajoutez cette ligne ! Évite d'écraser node_module
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G    
      

  # Backend NestJS
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: app-backend-service10
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      # - NODE_ENV=production
      - NODE_ENV=development    # Changé
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL:-postgresql://user:password@postgres:5432/app}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/app}
      - MONGODB_DB=${MONGODB_DB:-app}
      - JWT_SECRET=${JWT_SECRET:-supersecretkey}
      - CORS_ORIGIN=http://localhost
      - TZ=UTC
      - DEBUG=*
      - LOG_LEVEL=debug
    networks:
      - app-network
    volumes:
      - ./backend:/app
    
   
   
    depends_on:
      # postgres:
      #   condition: service_healthy
      mongodb:
        condition: service_healthy  
      # redis:
      #   condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M      


  # Nginx Reverse Proxy
  nginx:
    # image: ubuntu/nginx:1.18-22.04_beta
    # container_name: app-nginx-ubuntu
    image: nginx:stable-alpine3.23-perl 
    container_name: nginx-alpine10
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - app-network
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M    

