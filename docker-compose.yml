  # MongoDB - Base de données NoSQL
  mongodb:
    image: mongo:8
    container_name: mongo
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=albin
      - MONGO_INITDB_ROOT_PASSWORD=Albin@1234
      - MONGO_INITDB_DATABASE=admin
      - TZ=UTC
    networks:
      - app-network
    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb

    # healthcheck:
    #   test: ["CMD", "mongosh", "-u", "albin", "-p", "Albin%401234", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 5
    #   start_period: 30s

    healthcheck:
      test: ["CMD", "mongosh", --eval, "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s






  # MongoDB Express - Interface web pour MongoDB
  mongo-express:
    image: mongo-express:1.0.2-20-alpine3.19
    container_name: mongo-express10
    restart: unless-stopped
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_ROOT_USER:-albin}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_ROOT_PASSWORD:-Albin%401234}
      - ME_CONFIG_BASICAUTH_USERNAME=${MONGO_EXPRESS_USER:-admin}
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGO_EXPRESS_PASSWORD:-password}
      - ME_CONFIG_OPTIONS_EDITORTHEME=ambiance
    networks:
      - app-network
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    profiles:
      - tools
      - mongodb-tools


